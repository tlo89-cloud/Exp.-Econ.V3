name: Daily News Scraper

on:
  schedule:
    # 7am EST = 12:00 UTC (adjust to 11:00 UTC in summer for EDT)
    - cron: '0 12 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit events.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push events.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json
          git diff --staged --quiet || git commit -m "chore: update news signals $(date -u '+%Y-%m-%d')"
          git push
